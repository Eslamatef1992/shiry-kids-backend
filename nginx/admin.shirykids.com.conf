# /etc/nginx/sites-available/admin.shirykids.com
# Symlink: ln -s /etc/nginx/sites-available/admin.shirykids.com /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name admin.shirykids.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.shirykids.com;

    # ── SSL (Certbot will fill these in) ──────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/admin.shirykids.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.shirykids.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"   always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header X-Content-Type-Options  "nosniff"       always;
    add_header Referrer-Policy         "no-referrer-when-downgrade" always;

    # ── React SPA build (output of: npm run build) ────────────────────────────
    root  /var/www/shiry-kids-admin/dist;
    index index.html;

    # Gzip static assets
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;

    # Long-lived cache for hashed assets (Vite adds content hash to filenames)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # All other routes → index.html (React Router client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
