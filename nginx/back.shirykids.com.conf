# /etc/nginx/sites-available/back.shirykids.com
# Symlink: ln -s /etc/nginx/sites-available/back.shirykids.com /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name back.shirykids.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name back.shirykids.com;

    # ── SSL (Certbot will fill these in) ──────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/back.shirykids.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/back.shirykids.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"   always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header X-Content-Type-Options  "nosniff"       always;
    add_header Referrer-Policy         "no-referrer-when-downgrade" always;

    # ── Upload size limit (match MAX_FILE_SIZE in .env) ───────────────────────
    client_max_body_size 10M;

    # ── Static uploads served directly ────────────────────────────────────────
    location /uploads/ {
        alias /var/www/shiry-kids-backend/uploads/;
        expires 30d;
        access_log off;
    }

    # ── Health check (no logging) ─────────────────────────────────────────────
    location /health {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        access_log         off;
    }

    # ── API proxy → Node.js (PM2 cluster on port 3000) ────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout  60s;
    }
}
